version: '3.9'
services:
  db:
    image: postgres:15-alpine
    container_name: workledger-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: workledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - '5434:5432'
    volumes:
      - workledger-db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M # Keeps the DB from eating your 12GB RAM

  backend:
    build:
      context: ./WorkLedger_Backend
    container_name: workledger-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workledger
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 1G # Typical limit for a Spring Boot app

  frontend:
    build:
      context: ./WorkLedger_Frontend
    container_name: workledger-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M # Frontend Nginx is very lightweight

volumes:
  workledger-db-data:
