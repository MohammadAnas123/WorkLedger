version: '3.9'

services:
  # 1. The Database
  db:
    image: postgres:15-alpine
    container_name: workledger-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: workledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - '5434:5432' # Avoids conflict with Gym DB (5433)
    volumes:
      - workledger-db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  # 2. The Backend
  backend:
    build:
      context: ./WorkLedger_Backend
    container_name: workledger-backend
    restart: unless-stopped
    ports:
      - '8081:8080' # THIS FIXES IT: Bridges host port 8081 to container port 8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workledger
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 1G

  # 3. The Frontend
  frontend:
    build:
      context: ./WorkLedger_Frontend
    container_name: workledger-frontend
    restart: unless-stopped
    ports:
      - '5174:80' # Bridges host port 5174 to Nginx container port 80
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  workledger-db-data: