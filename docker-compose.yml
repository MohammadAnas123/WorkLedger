version: '3.9'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: workledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./WorkLedger_Backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workledger
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - '8080:8080'
    depends_on:
      - db

  frontend:
    build:
      context: ./WorkLedger_Frontend
    ports:
      - '4173:80'
    depends_on:
      - backend

volumes:
  db-data:
